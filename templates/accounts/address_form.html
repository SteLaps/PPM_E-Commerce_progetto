{% extends "base.html" %}
{% block title %} {{ action }} indirizzo {% endblock %}
{% block content %}

    
<h2 class="mb-4"> {{ action }} indirizzo </h2>
<div class="row justify-content-center">
    <div class="col-md-6">
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div class="mb-3">
                    <label class="form-label"> {{ field.label }} </label>
                    {{ field }}
                    {% if field.errors %}
                        <div class="text-danger-small"> {{ field.errors|join:', ' }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-primary"> Salva </button>
            <a href="{% url 'accounts:address_list' %}" class="btn btn-outline-secondary"> Annulla </a>
        </form>
    </div>
</div>

{% endblock %}
