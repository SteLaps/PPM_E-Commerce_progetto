{% extends "base.html" %}
{% block title %} {{ action }} categoria {% endblock %}
{% block content %}

<h2 class="mb-4"> {{ action }} categoria </h2>

<form method="post">
    {% csrf_token %}
    {% for field in form %}
        <div class="mb-3">
            <label class="form-label">
                {{ field.label }}
                {% if field.field.required %}
                    <span class="text-danger"> * </span>
                {% endif %}
            </label>
            {{ field }}
            {% if field.errors %}
                <div class="text-danger small"> {{ field.errors|join:', ' }} </div>
            {% endif %}
        </div>
    {% endfor %}
    <button type="submit" class="btn btn-primary"> Salva </button>
    <a href="{% url 'catalogo:manager_dashboard' %}" class="btn btn-outline-secondary"> Annulla </a>
</form>

{% endblock %}
