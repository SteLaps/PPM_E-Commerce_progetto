{% extends "base.html" %}
{% block title %} Elimina prodotto {% endblock %}
{% block content %}

<h2 class="mb-4"> Elimina prodotto </h2>

<p> Sei sicuro di voler eliminare <strong> {{ product.name }} </strong>? L'operazione è irreversibile.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-danger"> Sì, elimina. </button>
    <a href="{% url 'catalogo:product_list' %}" class="btn btn-secondary"> Annulla </a>
</form>

{% endblock %}
